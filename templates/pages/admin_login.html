{% extends "layout/base.html" %}

{% block content %}

<div class="container py-5">

    <h2>Admin Login</h2>

    <form method="POST">

        <input
            type="text"
            name="username"
            class="form-control mb-3"
            placeholder="Username">

        <input
            type="password"
            name="password"
            class="form-control mb-3"
            placeholder="Password">

        <button
            class="btn btn-primary">

            Login

        </button>

    </form>

</div>

{% endblock %}
